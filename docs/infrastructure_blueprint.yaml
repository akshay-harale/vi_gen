version: '3.8'

# This architecture decouples the API from the GPU worker, allowing 
# the system to queue 100s of requests without crashing a 4GB GPU.

services:
  # 1. THE API GATEWAY (Node.js/Go)
  # Accepts requests, writes to DB, pushes to Queue. Never touches the GPU.
  api-gateway:
    build: 
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis-queue:6379
      - DB_URL=postgres://user:pass@postgres-db:5432/videodb
    depends_on:
      - redis-queue
      - postgres-db

  # 2. THE MESSAGE QUEUE
  # Acts as a shock absorber. Holds requests in line.
  redis-queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. THE GPU WORKER (Python + Orchestration)
  # Pulls ONE job at a time from Redis. Has exclusive access to the GPU.
  video-render-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - REDIS_URL=redis://redis-queue:6379
      - DB_URL=postgres://user:pass@postgres-db:5432/videodb
      - OLLAMA_HOST=http://ollama-llm:11434
    depends_on:
      - redis-queue
      - ollama-llm
    volumes:
      - ./output:/app/output # Saves generated videos locally

  # 4. LOCAL LLM SERVICE
  # Runs the text generation logic.
  ollama-llm:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 5. STATE MANAGEMENT
  # Tracks job status (Pending, Processing, Completed, Failed)
  postgres-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=videodb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  pg_data:
  ollama_models: