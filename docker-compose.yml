services:
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000

  api-gateway:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis-queue:6379
      - DB_URL=postgres://user:pass@postgres-db:5432/videodb
    depends_on:
      - redis-queue
      - postgres-db
    env_file:
      - .env
    volumes:
      - ./output:/app/output

  redis-queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  video-render-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis-queue:6379
      - DB_URL=postgres://user:pass@postgres-db:5432/videodb
      - API_URL=http://api-gateway:3000
    depends_on:
      - redis-queue
    ports:
      - "5001:5001"
    volumes:
      - ./output:/app/output

  postgres-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=videodb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  db-init:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: node scripts/init_db.js
    environment:
      - DB_URL=postgres://user:pass@postgres-db:5432/videodb
    env_file:
      - .env
    depends_on:
      - postgres-db

volumes:
  redis_data:
  pg_data:
